kind = "web"
previewPath = "/"
title = "Velvetora.v"
version = "1.0.0"
id = "artifacts/velvetora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20026

[services.development]
run = "pnpm --filter @workspace/velvetora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/velvetora", "run", "build" ]
publicDir = "artifacts/velvetora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20026"
BASE_PATH = "/"
